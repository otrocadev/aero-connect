# AeroConnect — Stubby4node API Mock
# Arrancar con: npm run mock
# Endpoints disponibles en http://localhost:8882/api/

# ─────────────────────────────────────────────
# AUTH
# ─────────────────────────────────────────────
- request:
    url: /api/auth/login
    method: POST
    headers:
      content-type: application/json
  response:
    status: 200
    headers:
      content-type: application/json
      Access-Control-Allow-Origin: "*"
    body: >
      {
        "token": "bW9jay10b2tlbi14eHg=",
        "email": "test@aeroconnect.com",
        "expiresIn": 86400
      }

# CORS preflight para /api/auth/login
- request:
    url: /api/auth/login
    method: OPTIONS
  response:
    status: 200
    headers:
      Access-Control-Allow-Origin: "*"
      Access-Control-Allow-Methods: "POST, OPTIONS"
      Access-Control-Allow-Headers: "Content-Type, Authorization"

# ─────────────────────────────────────────────
# AIRPORTS
# ─────────────────────────────────────────────
- request:
    url: /api/airports
    method: GET
  response:
    status: 200
    headers:
      content-type: application/json
      Access-Control-Allow-Origin: "*"
    body: >
      [
        { "code": "BCN", "city": "Barcelona" },
        { "code": "MAD", "city": "Madrid" },
        { "code": "VLC", "city": "Valencia" },
        { "code": "SVQ", "city": "Sevilla" },
        { "code": "PMI", "city": "Palma de Mallorca" },
        { "code": "LPA", "city": "Las Palmas" }
      ]

# CORS preflight para /api/airports
- request:
