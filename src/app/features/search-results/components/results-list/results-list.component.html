<section class="flight-list">
        <p class="flight-list__count">
          {{ filteredFlights().length }} vuelo{{ filteredFlights().length !== 1 ? 's' : '' }} encontrado{{ filteredFlights().length !== 1 ? 's' : '' }}
        </p>

        @if (filteredFlights.length === 0) {
          <div class="flight-list__empty">
            <p>No hay vuelos disponibles con estos filtros.</p>
          </div>
        }

        <!-- TARJETA DE VUELO (extraer a FlightCardComponent en shared/) -->
        @for (flight of filteredFlights(); track flight.id) {
          <app-flight-card></app-flight-card>
        }
</section>
