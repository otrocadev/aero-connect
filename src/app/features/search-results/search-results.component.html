<div class="results-page">

  <app-results-header></app-results-header>
  <app-results-spinner [isLoading]="isLoading"></app-results-spinner>
  <app-results-error [error]="error"></app-results-error>
  @if(!isLoading() && !error()){
    <div class="results-body">
      <app-results-filters></app-results-filters>
      <app-results-list></app-results-list>
    </div>
  }
</div>
